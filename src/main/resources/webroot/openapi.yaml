openapi: 3.0.3
info:
  title: Airline Booking API
  description: |
    RESTful API for an international Airline Booking System built with Vert.x.
    Handles airlines, flights, passengers, and bookings.
  version: 1.0.0
  contact:
    name: Booking System
servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Airlines
    description: Airline carrier management
  - name: Flights
    description: Flight scheduling and search
  - name: Passengers
    description: Passenger profile management
  - name: Bookings
    description: Ticket reservation and cancellation

paths:
  /airlines:
    get:
      tags: [Airlines]
      summary: List all airlines
      operationId: getAllAirlines
      responses:
        '200':
          description: List of all registered airlines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Airline'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Airlines]
      summary: Register a new airline
      operationId: createAirline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AirlineRequest'
            example:
              code: "VS"
              name: "Virgin Atlantic"
              country: "United Kingdom"
      responses:
        '201':
          description: Airline created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Airline'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flights:
    post:
      tags: [Flights]
      summary: Add a new flight
      operationId: createFlight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlightRequest'
            example:
              flightNumber: "EK001"
              airlineId: 1
              departureAirport: "DXB"
              arrivalAirport: "LHR"
              departureTime: "2025-08-01T08:00:00"
              arrivalTime: "2025-08-01T14:00:00"
              availableSeats: 180
              totalSeats: 180
              price: 850.00
      responses:
        '201':
          description: Flight created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flights/search:
    get:
      tags: [Flights]
      summary: Search flights by route
      operationId: searchFlights
      parameters:
        - name: from
          in: query
          required: true
          description: Departure airport IATA code
          schema:
            type: string
            example: LHR
        - name: to
          in: query
          required: true
          description: Arrival airport IATA code
          schema:
            type: string
            example: JFK
      responses:
        '200':
          description: List of matching flights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Flight'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /flights/{id}:
    get:
      tags: [Flights]
      summary: Get flight details by ID
      operationId: getFlightById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Flight details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Flight'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /passengers:
    post:
      tags: [Passengers]
      summary: Register a new passenger
      operationId: createPassenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerRequest'
            example:
              firstName: "John"
              lastName: "Doe"
              email: "john.doe@example.com"
              phone: "+27821234567"
              passportNumber: "A12345678"
              dateOfBirth: "1990-05-15"
      responses:
        '201':
          description: Passenger registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Passenger'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /passengers/{id}/bookings:
    get:
      tags: [Passengers, Bookings]
      summary: List all bookings for a passenger
      operationId: getPassengerBookings
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: List of bookings for the passenger
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bookings:
    post:
      tags: [Bookings]
      summary: Book a ticket for a passenger on a flight
      operationId: createBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            example:
              passengerId: 1
              flightId: 1
              seatNumber: "12A"
      responses:
        '201':
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Retrieve booking details
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Booking details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [Bookings]
      summary: Cancel a booking
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '204':
          description: Booking cancelled successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Numeric resource identifier
      schema:
        type: integer
        format: int64
        example: 1

  responses:
    BadRequest:
      description: Invalid request — missing or malformed fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource already exists (duplicate key)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2025-08-01T10:00:00"
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Not Found"
        message:
          type: string
          example: "Airline not found with ID: 99"
        path:
          type: string
          example: "/airlines/99"

    AirlineRequest:
      type: object
      required: [code, name, country]
      properties:
        code:
          type: string
          description: Unique IATA airline code (2-3 characters)
          example: EK
        name:
          type: string
          example: Emirates
        country:
          type: string
          example: United Arab Emirates

    Airline:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        country:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FlightRequest:
      type: object
      required: [flightNumber, airlineId, departureAirport, arrivalAirport, departureTime, arrivalTime, availableSeats, totalSeats, price]
      properties:
        flightNumber:
          type: string
          example: EK001
        airlineId:
          type: integer
          format: int64
          example: 1
        departureAirport:
          type: string
          example: DXB
        arrivalAirport:
          type: string
          example: LHR
        departureTime:
          type: string
          description: ISO-8601 datetime (yyyy-MM-ddTHH:mm:ss)
          example: "2025-08-01T08:00:00"
        arrivalTime:
          type: string
          description: ISO-8601 datetime (yyyy-MM-ddTHH:mm:ss)
          example: "2025-08-01T14:00:00"
        availableSeats:
          type: integer
          example: 180
        totalSeats:
          type: integer
          example: 180
        price:
          type: number
          format: double
          example: 850.00

    Flight:
      type: object
      properties:
        id:
          type: integer
          format: int64
        flightNumber:
          type: string
        airlineId:
          type: integer
          format: int64
        departureAirport:
          type: string
        arrivalAirport:
          type: string
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        availableSeats:
          type: integer
        totalSeats:
          type: integer
        price:
          type: number
        status:
          type: string
          enum: [SCHEDULED, DELAYED, CANCELLED, COMPLETED]

    PassengerRequest:
      type: object
      required: [firstName, lastName, email, passportNumber]
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        phone:
          type: string
          example: "+27821234567"
        passportNumber:
          type: string
          example: A12345678
        dateOfBirth:
          type: string
          example: "1990-05-15"

    Passenger:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        passportNumber:
          type: string
        dateOfBirth:
          type: string
        createdAt:
          type: string
          format: date-time

    BookingRequest:
      type: object
      required: [passengerId, flightId, seatNumber]
      properties:
        passengerId:
          type: integer
          format: int64
          example: 1
        flightId:
          type: integer
          format: int64
          example: 1
        seatNumber:
          type: string
          example: "12A"

    Booking:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingReference:
          type: string
          example: "A1B2C3D4"
        passengerId:
          type: integer
          format: int64
        flightId:
          type: integer
          format: int64
        seatNumber:
          type: string
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
        totalAmount:
          type: number
        bookingDate:
          type: string
          format: date-time
