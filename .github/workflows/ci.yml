name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & run tests with coverage
        run: mvn clean verify --no-transfer-progress

      - name: Coverage summary
        if: always()
        run: |
          echo "## Test & Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REPORT="target/site/jacoco/index.html"
          if [ -f "$REPORT" ]; then
            INSTRUCTIONS=$(grep -oP 'Total[^%]+?(\d+)%' "$REPORT" | head -1 || true)
            echo "JaCoCo report generated at \`target/site/jacoco/index.html\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Metric | Threshold | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          SUREFIRE="target/surefire-reports"
          if [ -d "$SUREFIRE" ]; then
            TOTAL=$(grep -rh 'tests=' "$SUREFIRE"/*.xml 2>/dev/null | grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s}')
            ERRORS=$(grep -rh 'errors=' "$SUREFIRE"/*.xml 2>/dev/null | grep -oP 'errors="\K[0-9]+' | awk '{s+=$1} END {print s}')
            FAILURES=$(grep -rh 'failures=' "$SUREFIRE"/*.xml 2>/dev/null | grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s}')
            echo "| Tests passed | — | ${TOTAL} total, ${ERRORS} errors, ${FAILURES} failures |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "| Instruction coverage | ≥ 85% | See JaCoCo report |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch coverage | ≥ 80% | See JaCoCo report |" >> $GITHUB_STEP_SUMMARY
          echo "| Line coverage | ≥ 85% | See JaCoCo report |" >> $GITHUB_STEP_SUMMARY

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
